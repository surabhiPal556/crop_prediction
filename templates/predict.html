

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Resultant crop</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="/static/frontend/css/loading-bar.css"/>
  <script type="text/javascript" src="/static/frontend/load/loading-bar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>

  <style>
    /* Background color animation */
    body {
      background: linear-gradient(to right, #f7f8f9, #e0e4e8, #c3cfe2);
      animation: background-shift 10s ease-in-out infinite;
    }

    @keyframes background-shift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
      100% { background-position: 0% 0%; }
    }

    /* Card animation using GSAP */
    .animated-card {
      transform: rotateY(0deg); /* Initial card rotation (optional) */
    }

    /* Image animation */
    .card-img-top {
      animation: fadeIn 2s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

	<!-- about -->
	<!-- about-top -->
	<div class="about-top">

<div class="container mt-3">
  <div class="row">
    <div class="col-md-4"></div>
    <div class="col-md-4">
      <div class="card animated-card">
        <img class="card-img-top" src="/static/picture/{{crop}}.jpg" alt="Card image" style="width:100%">
        <div class="card-body">
          <h4 class="card-title">{{crop}}</h4>
        </div>
      </div>
    </div>
    <div class="col-md-4"></div>
  </div>
</div>
</div>
<script>
  const card = document.querySelector('.animated-card');

  // GSAP animation for card color shift and rotation
  gsap.to(card, {
    duration: 5,
    ease: "power2.inOut",
    backgroundColor: "hsl(0, 100%, 50%)",
    yoyo: true,
    repeat: -1,
    rotationY: 360
  });

  // Consider using additional GSAP animations for more complex effects
</script>

</body>
</html>
